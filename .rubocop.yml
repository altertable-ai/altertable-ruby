plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.0
  Exclude:
    - 'vendor/**/*'
    - 'spec/**/*'
    - 'bin/**/*'
    - 'gemfiles/**/*'

Style/Documentation:
  Enabled: false
Style/FrozenStringLiteralComment:
  Enabled: false
Style/StringLiterals:
  Enabled: false
Layout/LineLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/ParameterLists:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Layout/TrailingWhitespace:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Gemspec/RequireMFA:
  Enabled: false
Gemspec/OrderedDependencies:
  Enabled: false
Gemspec/DevelopmentDependencies:
  Enabled: false
Gemspec/RequiredRubyVersion:
  Enabled: false
Style/IfUnlessModifier:
  Enabled: false
Layout/EmptyLineAfterGuardClause:
  Enabled: false
Layout/EmptyLinesAroundModuleBody:
  Enabled: false
Lint/MissingSuper:
  Enabled: false
Naming/MethodParameterName:
  Enabled: false
Layout/IndentationWidth:
  Enabled: false
Style/Proc:
  Enabled: false
Style/FetchEnvVar:
  Enabled: false
Style/MutableConstant:
  Enabled: false
Bundler/OrderedGems:
  Enabled: false
